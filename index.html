<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Braun Casting Application</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="casting-form" aria-live="polite">
      <h1>Braun Casting Application</h1>

      <input id="firstName" name="firstName" placeholder="First name" autocomplete="given-name" />
      <input id="lastName" name="lastName" placeholder="Last name" autocomplete="family-name" />
      <input id="email" name="email" type="email" placeholder="Email" autocomplete="email" />

      <label class="dropzone" id="polaDropzone" for="polaFile">
        <span class="dropzone-title">Upload Polaroid</span>
        <span class="dropzone-hint">Drag & drop image or click to browse</span>
        <input type="file" id="polaFile" accept="image/*" />
      </label>
      <div class="preview" id="polaPreview"></div>

      <label class="dropzone" id="videoDropzone" for="videoFile">
        <span class="dropzone-title">Upload Video</span>
        <span class="dropzone-hint">Drag & drop video or click to browse</span>
        <input type="file" id="videoFile" accept="video/*" />
      </label>
      <div class="preview" id="videoPreview"></div>

      <div class="progress-wrap">
        <div class="progress-bar" id="progressBar"></div>
      </div>
      <p class="progress-text" id="progressText">0%</p>

      <button id="applyBtn" type="button">Submit Application</button>

      <p id="status" class="status"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
